<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login - ZAK Printing</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#1337ec",
        "background-light": "#f6f6f8",
        "background-dark": "#101322",
      },
      fontFamily: { "display": ["Inter"] },
      borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
    },
  },
}
</script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div id="mobile-menu" class="hidden md:hidden fixed inset-0 z-40 bg-black/50 backdrop-blur-sm" onclick="document.getElementById('mobile-menu').classList.add('hidden');"></div>
<main class="flex-1 flex items-center justify-center p-6">
<div class="w-full max-w-[440px]">
<!-- Logo -->
<div class="flex items-center justify-center gap-3 mb-10">
<div class="size-12 bg-primary rounded-2xl flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-2xl">admin_panel_settings</span>
</div>
<div>
<h1 class="text-2xl font-black tracking-tight">ZAK Printing</h1>
<p class="text-xs text-slate-500 font-semibold uppercase tracking-widest">Admin Portal</p>
</div>
</div>

<!-- Login Card -->
<div class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="p-8">
<h2 class="text-xl font-black mb-1">Welcome back</h2>
<p class="text-sm text-slate-500 mb-8">Sign in to your admin account</p>

<form id="loginForm" class="space-y-5">
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">mail</span>
<input name="email" type="email" required
  class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white pl-10 pr-4 py-3.5 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400"
  placeholder="admin@zakprinting.com"/>
</div>
</div>

<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
<input name="password" type="password" required
  class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white pl-10 pr-12 py-3.5 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400"
  placeholder="Enter your password"/>
<button type="button" onclick="this.previousElementSibling.type = this.previousElementSibling.type === 'password' ? 'text' : 'password'"
  class="absolute right-0 h-full px-3 flex items-center text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>

<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer">
  <input type="checkbox" name="remember" class="rounded border-slate-300 text-primary focus:ring-primary"/>
  <span class="text-sm text-slate-600 dark:text-slate-400">Remember me</span>
</label>
<a href="password-reset.html" class="text-sm text-primary font-semibold hover:underline">Forgot password?</a>
</div>

<button type="submit" id="loginBtn"
  class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">login</span>
Sign In
</button>
</form>
</div>

<div class="bg-slate-50 dark:bg-slate-800/30 px-8 py-4 border-t border-slate-100 dark:border-slate-800 flex items-center gap-2">
<span class="material-symbols-outlined text-slate-400 text-sm">shield</span>
<p class="text-xs text-slate-500">Secured with session-based authentication</p>
</div>
</div>

<p class="text-center text-xs text-slate-400 mt-6">© 2026 ZAK Printing – All rights reserved</p>
</div>
</main>

<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full -z-10 opacity-30 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[100px]"></div>
</div>
</div>

<!-- ZAK V4: Admin login wiring -->
<script src="js/admin-api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // If already logged in, redirect to dashboard
  adminFetch('/auth.php').then(res => {
    if (res && res.authenticated) {
      window.location.href = 'admin-dash.html';
    }
  }).catch(() => {});

  const form = document.getElementById('loginForm');
  const btn = document.getElementById('loginBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = form.email.value.trim();
    const password = form.password.value;

    if (!email || !password) {
      showAdminToast('Please enter email and password', 'error');
      return;
    }

    btn.innerHTML = '<span class="material-symbols-outlined text-lg animate-spin">progress_activity</span> Signing in...';
    btn.disabled = true;

    try {
      const res = await adminFetch('/auth.php', {
        method: 'POST',
        data: { email, password }
      });

      if (res.success || res.authenticated) {
        showAdminToast('Login successful!', 'success');
        setTimeout(() => window.location.href = 'admin-dash.html', 600);
      } else {
        throw new Error(res.error || 'Login failed');
      }
    } catch (err) {
      showAdminToast(err.message || 'Invalid credentials', 'error');
      btn.innerHTML = '<span class="material-symbols-outlined text-lg">login</span> Sign In';
      btn.disabled = false;
    }
  });
});
</script>
<script src="js/sidebar-controller.js" defer></script></body></html>
