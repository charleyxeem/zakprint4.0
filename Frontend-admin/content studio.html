        Content Studio

      <button class="block-type-button p-6 rounded-xl border-2 border-slate-200 dark:border-slate-700 hover:border-primary hover:bg-primary/5 transition-all text-center" data-type="image"><span class="material-symbols-outlined text-4xl block mb-2 text-slate-600 dark:text-slate-400">crop_original</span><span class="font-bold text-sm">Single Image</span></button>

      <div><label class="block text-sm font-bold mb-2">Contact Email</label><input id="set-contact-email" type="email" class="w-full px-3 py-2 text-sm border border-slate-200 dark:border-slate-700 rounded-lg dark:bg-slate-800"/></div>

      <div><label class="block text-sm font-bold mb-2">Facebook URL</label><input id="set-social-facebook" type="url" class="w-full px-3 py-2 text-sm border border-slate-200 dark:border-slate-700 rounded-lg dark:bg-slate-800"/></div>
      <div><label class="block text-sm font-bold mb-2">Instagram URL</label><input id="set-social-instagram" type="url" class="w-full px-3 py-2 text-sm border border-slate-200 dark:border-slate-700 rounded-lg dark:bg-slate-800"/></div>
      <button id="btn-save-settings" class="w-full mt-6 py-2 bg-primary text-white font-bold rounded-lg hover:bg-primary/90 transition-colors">Save Settings</button>

<script>
window.REQUIRED_ROLE = "super_admin";

<script src="../Frontend-admin/js/admin-api.js?v=20260409"></script>
<script src="../Frontend-admin/js/admin-auth.js?v=20260409"></script>
<script src="../Frontend-admin/js/sidebar-controller.js?v=20260409"></script>
<script>
const CS = {
  state: {
    pages: [],
    currentPage: null,
    currentPageData: null,
    blocks: [],
    dirty: new Set()
  },

  pageIcons: {
    home: "home",
    shop: "storefront",
    services: "build",
    about: "info",
    contact: "mail",
    blog: "article",
    faq: "help",
    portfolio: "photo_library",
    "privacy-policy": "lock",
    terms: "gavel",
    "shipping-info": "local_shipping"
  },

  escape(v) {
    return String(v ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#39;");
  },

  parseJsonSafe(text, fallback) {
    try { return JSON.parse(text || ""); } catch (e) { return fallback; }
  },

  markDirty() {
    document.getElementById("btn-save-all").disabled = false;
  },

  async init() {
    await this.loadPages();
    this.bindGlobalEvents();
  },

  async loadPages() {
    const res = await adminFetch("/cms.php?pages=1");
    this.state.pages = res.pages || [];
    this.renderPages();
  },

  renderPages() {
    const list = document.getElementById("pages-list");
    list.innerHTML = (this.state.pages || []).map((p) => {
      const active = this.state.currentPage && Number(this.state.currentPage.id) === Number(p.id);
      return `<button class="page-card w-full text-left p-3 rounded-lg border ${active ? "border-primary bg-primary/5" : "border-slate-200 dark:border-slate-700 hover:border-primary hover:bg-slate-50 dark:hover:bg-slate-800"} transition-all" data-id="${p.id}" data-slug="${this.escape(p.slug)}">` +
        `<div class="flex items-center gap-3">` +
        `<span class="material-symbols-outlined text-lg text-slate-500">${this.pageIcons[p.slug] || "note"}</span>` +
        `<div class="flex-1 min-w-0"><p class="font-bold text-sm truncate">${this.escape(p.title)}</p><p class="text-xs text-slate-500 truncate">${this.escape(p.slug)}</p></div>` +
        `<span class="text-xs px-2 py-1 rounded-full ${Number(p.is_active) ? "bg-green-100 text-green-700" : "bg-slate-100 text-slate-600"}">${Number(p.is_active) ? "Live" : "Draft"}</span>` +
        `</div></button>`;
    }).join("");

    list.querySelectorAll(".page-card").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const id = Number(btn.dataset.id || 0);
        const slug = btn.dataset.slug || "";
        await this.selectPage(id, slug);
      });
    });
  },

  async selectPage(pageId, pageSlug) {
    const page = this.state.pages.find((p) => Number(p.id) === Number(pageId));
    this.state.currentPage = page || { id: pageId, slug: pageSlug };

    document.getElementById("breadcrumb-page").textContent = pageSlug;
    document.getElementById("breadcrumb").classList.remove("hidden");
    document.getElementById("canvas-empty").classList.add("hidden");
    document.getElementById("canvas-content").classList.remove("hidden");
    document.getElementById("settings-empty").classList.add("hidden");
    document.getElementById("settings-panel").classList.remove("hidden");

    this.renderPages();

    const res = await adminFetch(`/cms.php?page=${encodeURIComponent(pageSlug)}`);
    this.state.blocks = res.blocks || [];
    this.state.currentPageData = res.page || page || {};
    this.renderBlocks();
    this.fillPageSettings();
    document.getElementById("btn-save-all").disabled = true;
  },

  blockEditor(block) {
    const type = block.block_type || "text";

    if (["text", "hero", "cta", "team", "testimonial"].includes(type)) {
      return `<textarea class="block-content w-full px-3 py-2 text-sm border border-slate-200 dark:border-slate-700 rounded-lg dark:bg-slate-800 font-mono" rows="7">${this.escape(block.content_html || "")}</textarea><p class="text-xs text-slate-400 mt-1">HTML supported</p>`;
    }

    if (type === "faq") {
      const items = this.parseJsonSafe(block.content_html, []);
      const rows = Array.isArray(items) ? items : [];
      return `<div class="space-y-2 faq-wrap">${rows.map((item) => `<div class="faq-row p-3 border border-slate-200 dark:border-slate-700 rounded-lg"><input class="faq-q w-full text-sm px-2 py-1 border border-slate-300 dark:border-slate-600 rounded mb-2 dark:bg-slate-800" placeholder="Question" value="${this.escape(item.q || "")}"/><textarea class="faq-a w-full text-sm px-2 py-1 border border-slate-300 dark:border-slate-600 rounded dark:bg-slate-800" rows="3" placeholder="Answer">${this.escape(item.a || "")}</textarea><button class="mt-2 text-xs text-red-500 hover:text-red-700 remove-faq-item" type="button">Remove</button></div>`).join("")}</div><button class="text-xs text-primary hover:underline add-faq-item mt-2" type="button">+ Add Q&A pair</button>`;
    }

    if (type === "gallery") {
      const items = this.parseJsonSafe(block.content_html, []);
      const rows = Array.isArray(items) ? items : [];
      return `<div class="space-y-2 gallery-wrap">${rows.map((item) => `<div class="gallery-row p-3 border border-slate-200 dark:border-slate-700 rounded-lg"><input class="gallery-src w-full text-sm px-2 py-1 border border-slate-300 dark:border-slate-600 rounded mb-2 dark:bg-slate-800" placeholder="Image URL" value="${this.escape(item.src || "")}"/><input class="gallery-alt w-full text-sm px-2 py-1 border border-slate-300 dark:border-slate-600 rounded mb-2 dark:bg-slate-800" placeholder="Alt text" value="${this.escape(item.alt || "")}"/><input class="gallery-caption w-full text-sm px-2 py-1 border border-slate-300 dark:border-slate-600 rounded mb-2 dark:bg-slate-800" placeholder="Caption" value="${this.escape(item.caption || "")}"/><button class="text-xs text-red-500 hover:text-red-700 remove-gallery-item" type="button">Remove</button></div>`).join("")}</div><button class="text-xs text-primary hover:underline add-gallery-item mt-2" type="button">+ Add image</button>`;
    }

    if (type === "image") {
      const image = this.parseJsonSafe(block.content_html, {});
      return `<div class="space-y-2"><input class="image-src w-full text-sm px-2 py-1 border border-slate-300 dark:border-slate-600 rounded dark:bg-slate-800" placeholder="Image URL" value="${this.escape(image.src || "")}"/><input class="image-alt w-full text-sm px-2 py-1 border border-slate-300 dark:border-slate-600 rounded dark:bg-slate-800" placeholder="Alt text" value="${this.escape(image.alt || "")}"/><input class="image-caption w-full text-sm px-2 py-1 border border-slate-300 dark:border-slate-600 rounded dark:bg-slate-800" placeholder="Caption" value="${this.escape(image.caption || "")}"/></div>`;
    }

    return `<textarea class="block-content w-full px-3 py-2 text-sm border border-slate-200 dark:border-slate-700 rounded-lg dark:bg-slate-800 font-mono" rows="6">${this.escape(block.content_html || "")}</textarea>`;
  },

  renderBlocks() {
    const list = document.getElementById("blocks-list");
    list.innerHTML = (this.state.blocks || []).map((b) => {
      const type = b.block_type || "text";
      return `<div class="block-card p-4 border border-slate-200 dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-800" data-block-id="${b.id}" draggable="true"><div class="flex items-center justify-between mb-3"><div class="flex items-center gap-3 flex-1"><span class="cs-drag-handle cursor-move text-slate-400 hover:text-slate-600 dark:hover:text-slate-300"><span class="material-symbols-outlined">drag_handle</span></span><div class="flex-1"><div class="flex items-center gap-2"><span class="text-xs px-2 py-1 rounded-full bg-primary/10 text-primary font-bold">${this.escape(type.toUpperCase())}</span><input class="block-title flex-1 font-bold text-sm border-none bg-transparent" value="${this.escape(b.title || "Block")}"/></div><p class="text-xs text-slate-400 mt-1">${this.escape(b.block_key || "")}</p></div></div><button class="text-red-500 hover:text-red-700 delete-block" type="button" data-block-id="${b.id}"><span class="material-symbols-outlined">delete</span></button></div><div class="mt-3">${this.blockEditor(b)}</div></div>`;
    }).join("");

    this.bindBlockEvents();
  },

  bindBlockEvents() {
    const self = this;
    const list = document.getElementById("blocks-list");

    list.querySelectorAll("input, textarea").forEach((el) => {
      el.addEventListener("input", () => self.markDirty());
    });

    list.querySelectorAll(".delete-block").forEach((btn) => {
      btn.addEventListener("click", async () => {
        if (!confirm("Delete this block?")) return;
        const id = Number(btn.dataset.blockId || 0);
        await adminFetch(`/cms.php?block_id=${id}`, { method: "DELETE" });
        self.state.blocks = self.state.blocks.filter((b) => Number(b.id) !== id);
        self.renderBlocks();
        self.markDirty();
      });
    });

    list.querySelectorAll(".add-faq-item").forEach((btn) => {
      btn.addEventListener("click", () => {
        const wrap = btn.parentElement.querySelector(".faq-wrap");
        const row = document.createElement("div");
        row.className = "faq-row p-3 border border-slate-200 dark:border-slate-700 rounded-lg";
        row.innerHTML = '<input class="faq-q w-full text-sm px-2 py-1 border border-slate-300 dark:border-slate-600 rounded mb-2 dark:bg-slate-800" placeholder="Question"/><textarea class="faq-a w-full text-sm px-2 py-1 border border-slate-300 dark:border-slate-600 rounded dark:bg-slate-800" rows="3" placeholder="Answer"></textarea><button class="mt-2 text-xs text-red-500 hover:text-red-700 remove-faq-item" type="button">Remove</button>';
        wrap.appendChild(row);
        row.querySelector(".remove-faq-item").addEventListener("click", () => { row.remove(); self.markDirty(); });
        row.querySelectorAll("input, textarea").forEach((el) => el.addEventListener("input", () => self.markDirty()));
        self.markDirty();
      });
    });

    list.querySelectorAll(".remove-faq-item").forEach((btn) => {
      btn.addEventListener("click", () => {
        btn.closest(".faq-row").remove();
        self.markDirty();
      });
    });

    list.querySelectorAll(".add-gallery-item").forEach((btn) => {
      btn.addEventListener("click", () => {
        const wrap = btn.parentElement.querySelector(".gallery-wrap");
        const row = document.createElement("div");
        row.className = "gallery-row p-3 border border-slate-200 dark:border-slate-700 rounded-lg";
        row.innerHTML = '<input class="gallery-src w-full text-sm px-2 py-1 border border-slate-300 dark:border-slate-600 rounded mb-2 dark:bg-slate-800" placeholder="Image URL"/><input class="gallery-alt w-full text-sm px-2 py-1 border border-slate-300 dark:border-slate-600 rounded mb-2 dark:bg-slate-800" placeholder="Alt text"/><input class="gallery-caption w-full text-sm px-2 py-1 border border-slate-300 dark:border-slate-600 rounded mb-2 dark:bg-slate-800" placeholder="Caption"/><button class="text-xs text-red-500 hover:text-red-700 remove-gallery-item" type="button">Remove</button>';
        wrap.appendChild(row);
        row.querySelector(".remove-gallery-item").addEventListener("click", () => { row.remove(); self.markDirty(); });
        row.querySelectorAll("input").forEach((el) => el.addEventListener("input", () => self.markDirty()));
        self.markDirty();
      });
    });

    list.querySelectorAll(".remove-gallery-item").forEach((btn) => {
      btn.addEventListener("click", () => {
        btn.closest(".gallery-row").remove();
        self.markDirty();
      });
    });

    this.bindDragDrop();
  },

  bindDragDrop() {
    const list = document.getElementById("blocks-list");
    let drag = null;

    list.querySelectorAll(".block-card").forEach((card) => {
      card.addEventListener("dragstart", () => {
        drag = card;
        card.style.opacity = "0.5";
      });
      card.addEventListener("dragend", () => {
        card.style.opacity = "1";
      });
    });

    list.addEventListener("dragover", (e) => {
      e.preventDefault();
      const after = this.dragAfterElement(list, e.clientY);
      if (!drag) return;
      if (after == null) list.appendChild(drag);
      else list.insertBefore(drag, after);
    });

    list.addEventListener("drop", () => {
      this.markDirty();
    });
  },

  dragAfterElement(container, y) {
    const els = [...container.querySelectorAll(".block-card")];
    return els.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      if (offset < 0 && offset > closest.offset) {
        return { offset: offset, element: child };
      }
      return closest;
    }, { offset: Number.NEGATIVE_INFINITY }).element;
  },

  fillPageSettings() {
    const p = this.state.currentPageData || {};
    document.getElementById("setting-title").value = p.title || "";
    document.getElementById("setting-meta-title").value = p.meta_title || "";
    document.getElementById("setting-meta-desc").value = p.meta_description || "";
    document.getElementById("setting-active").checked = Number(p.is_active) === 1 || p.is_active === true;
  },

  collectBlocksFromUI() {
    const collected = [];
    document.querySelectorAll(".block-card").forEach((card) => {
      const id = Number(card.dataset.blockId || 0);
      const block = this.state.blocks.find((b) => Number(b.id) === id);
      if (!block) return;

      const type = block.block_type || "text";
      const title = card.querySelector(".block-title")?.value || block.title || "";
      let content = "";

      if (["text", "hero", "cta", "team", "testimonial"].includes(type)) {
        content = card.querySelector(".block-content")?.value || "";
      } else if (type === "faq") {
        const items = [];
        card.querySelectorAll(".faq-row").forEach((row) => {
          items.push({
            q: row.querySelector(".faq-q")?.value || "",
            a: row.querySelector(".faq-a")?.value || ""
          });
        });
        content = JSON.stringify(items);
      } else if (type === "gallery") {
        const items = [];
        card.querySelectorAll(".gallery-row").forEach((row) => {
          items.push({
            src: row.querySelector(".gallery-src")?.value || "",
            alt: row.querySelector(".gallery-alt")?.value || "",
            caption: row.querySelector(".gallery-caption")?.value || ""
          });
        });
        content = JSON.stringify(items);
      } else if (type === "image") {
        content = JSON.stringify({
          src: card.querySelector(".image-src")?.value || "",
          alt: card.querySelector(".image-alt")?.value || "",
          caption: card.querySelector(".image-caption")?.value || ""
        });
      }

      collected.push({
        id: block.id,
        block_key: block.block_key,
        block_type: type,
        title,
        content_html: content
      });
    });
    return collected;
  },

  async savePageSettingsOnly() {
    if (!this.state.currentPage) return;
    await adminFetch("/cms.php", {
      method: "POST",
      body: JSON.stringify({
        action: "update_seo",
        page_id: this.state.currentPage.id,
        title: document.getElementById("setting-title").value,
        meta_title: document.getElementById("setting-meta-title").value,
        meta_description: document.getElementById("setting-meta-desc").value,
        is_active: document.getElementById("setting-active").checked ? 1 : 0
      })
    });
  },

  async saveAll() {
    if (!this.state.currentPage) return;
    const payload = this.collectBlocksFromUI();
    const order = [];

    for (const block of payload) {
      order.push(block.id);
      await adminFetch("/cms.php", {
        method: "POST",
        body: JSON.stringify({
          action: "block",
          page_id: this.state.currentPage.id,
          block_key: block.block_key,
          block_type: block.block_type,
          title: block.title,
          content_html: block.content_html
        })
      });
    }

    await adminFetch("/cms.php", {
      method: "POST",
      body: JSON.stringify({
        action: "reorder_blocks",
        page_id: this.state.currentPage.id,
        order
      })
    });

    await this.savePageSettingsOnly();
    document.getElementById("btn-save-all").disabled = true;
    alert("All changes saved.");
  },

  async addBlock(type) {
    if (!this.state.currentPage) return;
    const key = `${this.state.currentPage.slug}_${type}_${Date.now()}`;
    const res = await adminFetch("/cms.php", {
      method: "POST",
      body: JSON.stringify({
        action: "block",
        page_id: this.state.currentPage.id,
        block_key: key,
        block_type: type,
        title: `New ${type} block`,
        content_html: ""
      })
    });

    this.state.blocks.push({
      id: res.id,
      page_id: this.state.currentPage.id,
      block_key: key,
      block_type: type,
      title: `New ${type} block`,
      content_html: ""
    });

    this.renderBlocks();
    this.markDirty();
  },

  async openNavModal() {
    const res = await adminFetch("/cms.php?nav=1");
    const items = res.nav || [];
    const list = document.getElementById("nav-items-list");

    list.innerHTML = items.map((item) => `<div class="nav-item p-3 border border-slate-200 dark:border-slate-700 rounded-lg space-y-2" data-id="${item.id}"><input class="nav-label w-full px-2 py-1 text-sm border border-slate-300 dark:border-slate-600 rounded dark:bg-slate-800" value="${this.escape(item.label || "")}"/><input class="nav-href w-full px-2 py-1 text-sm border border-slate-300 dark:border-slate-600 rounded dark:bg-slate-800" value="${this.escape(item.href || "")}"/><div class="flex items-center gap-2"><input class="nav-sort w-20 px-2 py-1 text-sm border border-slate-300 dark:border-slate-600 rounded dark:bg-slate-800" type="number" value="${Number(item.sort_order || 0)}"/><label class="flex items-center gap-2 text-sm"><input class="nav-visible" type="checkbox" ${Number(item.is_visible) ? "checked" : ""}/>Visible</label></div></div>`).join("");

    const modal = document.getElementById("modal-nav");
    modal.classList.remove("hidden");
    modal.classList.add("flex");
  },

  async saveNav() {
    const items = [];
    document.querySelectorAll(".nav-item").forEach((el) => {
      items.push({
        id: Number(el.dataset.id || 0),
        label: el.querySelector(".nav-label")?.value || "",
        href: el.querySelector(".nav-href")?.value || "",
        sort_order: Number(el.querySelector(".nav-sort")?.value || 0),
        is_visible: el.querySelector(".nav-visible")?.checked ? 1 : 0
      });
    });

    await adminFetch("/cms.php", {
      method: "POST",
      body: JSON.stringify({ action: "update_nav", items })
    });

    closeModal("modal-nav");
    alert("Navigation updated.");
  },

  async openSettingsModal() {
    const res = await adminFetch("/cms.php?settings=1");
    const s = res.settings || {};

    document.getElementById("set-site-name").value = s.site_name || "";
    document.getElementById("set-site-tagline").value = s.site_tagline || "";
    document.getElementById("set-contact-email").value = s.contact_email || "";
    document.getElementById("set-contact-phone").value = s.contact_phone || "";
    document.getElementById("set-social-facebook").value = s.social_facebook || "";
    document.getElementById("set-social-instagram").value = s.social_instagram || "";

    const modal = document.getElementById("modal-settings");
    modal.classList.remove("hidden");
    modal.classList.add("flex");
  },

  async saveSettings() {
    const settings = {
      site_name: document.getElementById("set-site-name").value,
      site_tagline: document.getElementById("set-site-tagline").value,
      contact_email: document.getElementById("set-contact-email").value,
      contact_phone: document.getElementById("set-contact-phone").value,
      social_facebook: document.getElementById("set-social-facebook").value,
      social_instagram: document.getElementById("set-social-instagram").value
    };

    await adminFetch("/cms.php", {
      method: "POST",
      body: JSON.stringify({ action: "update_settings", settings })
    });

    closeModal("modal-settings");
    alert("Settings updated.");
  },

  bindGlobalEvents() {
    document.getElementById("search-pages").addEventListener("input", (e) => {
      const q = String(e.target.value || "").toLowerCase();
      document.querySelectorAll(".page-card").forEach((card) => {
        card.style.display = card.textContent.toLowerCase().includes(q) ? "" : "none";
      });
    });

    document.getElementById("btn-save-all").addEventListener("click", () => this.saveAll());

    document.getElementById("btn-save-seo").addEventListener("click", async () => {
      await this.savePageSettingsOnly();
      alert("Page settings saved.");
    });

    document.getElementById("btn-add-block").addEventListener("click", () => {
      const modal = document.getElementById("modal-add-block");
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    });

    document.getElementById("btn-nav").addEventListener("click", () => this.openNavModal());
    document.getElementById("btn-settings").addEventListener("click", () => this.openSettingsModal());
    document.getElementById("btn-save-nav").addEventListener("click", () => this.saveNav());
    document.getElementById("btn-save-settings").addEventListener("click", () => this.saveSettings());

    document.querySelectorAll(".block-type-button").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const type = btn.dataset.type || "text";
        await this.addBlock(type);
        closeModal("modal-add-block");
      });
    });

    ["setting-title", "setting-meta-title", "setting-meta-desc", "setting-active"].forEach((id) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener("input", () => this.markDirty());
      el.addEventListener("change", () => this.markDirty());
    });
  }
};

function closeModal(id) {
  const modal = document.getElementById(id);
  if (!modal) return;
  modal.classList.add("hidden");
  modal.classList.remove("flex");
}

document.addEventListener("DOMContentLoaded", () => {
  CS.init();
});
</script>
</body>
</html>
